<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links | Harbour Wiki</title>
  <meta name="description" content="Useful Harbour, xBase, C, and tooling links preserved from Harbour Wiki.">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
  <link href="/assets/css/search-clear.css" rel="stylesheet">
</head>
<body>
  <header class="hw-header">
    <div class="hw-brand-panel">
      <a class="hw-brand-link" href="/" aria-label="Harbour Wiki home">
        <img class="hw-brand-logo" src="/images/harbour.svg" alt="" aria-hidden="true">
        <span class="hw-brand-title">Harbour Wiki</span>
      </a>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark hw-navbar" aria-label="Main navigation">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="mainNav" class="collapse navbar-collapse">
          <ul class="navbar-nav hw-mainnav">
            <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-fill" aria-hidden="true"></i><span>Home</span></a></li>
            <li class="nav-item"><a class="nav-link" href="/articles/"><i class="bi bi-file-earmark-fill" aria-hidden="true"></i><span>Articles</span></a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="/links/"><i class="bi bi-link-45deg" aria-hidden="true"></i><span>Links</span></a></li>
            <li class="nav-item"><a class="nav-link" href="/api/"><i class="bi bi-book-fill" aria-hidden="true"></i><span>API Explorer</span></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="hw-layout">
    <aside class="hw-sidebar" aria-label="Link categories">
      <nav id="linksCategoryNav" class="hw-sidebar-nav">
        <a href="#links-top" class="active">Loading links...</a>
      </nav>
    </aside>

    <section class="hw-content" id="links-top">
      <div class="hw-content-inner" id="linksIndex">
        <div class="hw-page-heading mb-2">
          <i class="bi bi-link-45deg text-primary" aria-hidden="true"></i>
          <h1>Links</h1>
        </div>

        <div class="hw-toolbar">
          <div class="input-group hw-search-group">
            <input id="linkSearch" class="form-control" type="search" placeholder="Search" aria-label="Search links" autocomplete="off">
            <button id="linkSearchClear" class="btn hw-search-clear" type="button" aria-label="Clear link search" hidden><i class="bi bi-x-lg" aria-hidden="true"></i></button>
            <button id="linkSearchButton" class="btn" type="button" aria-label="Search links"><i class="bi bi-search" aria-hidden="true"></i></button>
          </div>
        </div>

        <div id="linksStatus" class="hw-api-status">Loading links from <code>/links/links.json</code>...</div>
        <div id="linksEmpty" class="hw-empty-message" hidden>No links match the current search.</div>
        <div id="linksList" class="hw-links-json-list"></div>

        <noscript>
          <div class="hw-empty-message" style="display:block">
            JavaScript is required to render the editable links list from <code>/links/links.json</code>.
          </div>
        </noscript>
      </div>
    </section>
  </main>

  <footer class="hw-footer">
    <div class="d-flex flex-column flex-md-row justify-content-end gap-2">
      <span>Maintained by Eric Lendvai</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/links.js"></script>
</body>
</html>
